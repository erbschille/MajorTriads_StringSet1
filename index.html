<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Shuffle Viewer</title>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      cursor: pointer;
      user-select: none;
    }

    img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
    }

    .hint {
      position: fixed;
      bottom: 10px;
      color: #aaa;
      font-family: sans-serif;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <img id="viewer" src="" />
  <div class="hint">Click anywhere for next image</div>

  <script>
    // 1. LIST YOUR IMAGES HERE (from /images folder in repo)
    const imageBank = [
      "images/img1.jpg",
      "images/img2.jpg",
      "images/img3.jpg",
      "images/img4.jpg"
    ];

    // 2. Shuffle function
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    let shuffled = shuffle([...imageBank]);
    let index = 0;

    const imgEl = document.getElementById("viewer");

    function showImage() {
      imgEl.src = shuffled[index];
    }

    function nextImage() {
      index++;

      if (index >= shuffled.length) {
        shuffled = shuffle([...imageBank]);
        index = 0;
      }

      showImage();
    }

    document.body.addEventListener("click", nextImage);

    showImage();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Shuffle Viewer</title>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      cursor: pointer;
      user-select: none;
    }

    img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
    }

    .hint {
      position: fixed;
      bottom: 10px;
      color: #aaa;
      font-family: sans-serif;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <img id="viewer" src="" />
  <div class="hint">Click anywhere for next image</div>

  <script>
    // 1. LIST YOUR IMAGES HERE (from /images folder in repo)
    const imageBank = [
      "Screen Shot 2026-04-17 at 10.10.41 AM.png",
"Screen Shot 2026-04-17 at 10.11.59 AM.png",
"Screen Shot 2026-04-17 at 10.12.19 AM.png",
"Screen Shot 2026-04-17 at 10.11.36 AM.png",
"Screen Shot 2026-04-17 at 10.11.02 AM.png",
"Screen Shot 2026-04-17 at 10.12.05 AM.png",
"Screen Shot 2026-04-17 at 10.11.26 AM.png",
"Screen Shot 2026-04-17 at 10.11.45 AM.png",
"Screen Shot 2026-04-17 at 10.12.09 AM.png",
"Screen Shot 2026-04-17 at 10.10.20 AM.png",
"Screen Shot 2026-04-17 at 10.10.08 AM.png",
"Screen Shot 2026-04-17 at 10.10.16 AM.png",
"Screen Shot 2026-04-17 at 10.11.22 AM.png",
"Screen Shot 2026-04-17 at 10.11.30 AM.png",
"Screen Shot 2026-04-17 at 10.10.12 AM.png",
"Screen Shot 2026-04-17 at 10.10.28 AM.png",
"Screen Shot 2026-04-17 at 10.10.36 AM.png",
"Screen Shot 2026-04-17 at 10.10.47 AM.png",
"Screen Shot 2026-04-17 at 10.10.24 AM.png",
"Screen Shot 2026-04-17 at 10.12.14 AM.png",
"Screen Shot 2026-04-17 at 10.11.54 AM.png",
"Screen Shot 2026-04-17 at 10.12.53 AM.png",
"Screen Shot 2026-04-17 at 10.11.13 AM.png",
"Screen Shot 2026-04-17 at 10.12.41 AM.png",
"Screen Shot 2026-04-17 at 10.10.52 AM.png",
"Screen Shot 2026-04-17 at 10.10.33 AM.png",
"Screen Shot 2026-04-17 at 10.12.32 AM.png",
"Screen Shot 2026-04-17 at 10.10.58 AM.png",
"Screen Shot 2026-04-17 at 10.12.28 AM.png",
"Screen Shot 2026-04-17 at 10.12.36 AM.png",
"Screen Shot 2026-04-17 at 10.12.24 AM.png",
"Screen Shot 2026-04-17 at 10.11.40 AM.png",
"Screen Shot 2026-04-17 at 10.11.17 AM.png",
"Screen Shot 2026-04-17 at 10.11.09 AM.png",
"Screen Shot 2026-04-17 at 10.12.45 AM.png",
"Screen Shot 2026-04-17 at 10.12.49 AM.png",
"Screen Shot 2026-04-17 at 10.11.05 AM.png"
    ];

    // 2. Shuffle function
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    let shuffled = shuffle([...imageBank]);
    let index = 0;

    const imgEl = document.getElementById("viewer");

    function showImage() {
      imgEl.src = shuffled[index];
    }

    function nextImage() {
      index++;

      if (index >= shuffled.length) {
        shuffled = shuffle([...imageBank]);
        index = 0;
      }

      showImage();
    }

    document.body.addEventListener("click", nextImage);

    showImage();
  </script>

</body>
</html>
